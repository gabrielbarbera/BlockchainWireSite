<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Blockchain Wire | Web3 PR & Authority Distribution Platform</title>
    <meta name="title" content="Blockchain Wire | Web3 PR & Authority Distribution Platform" />
    <meta name="description" content="High-authority PR distribution for Web3 and Digital Asset projects. Stop being invisible and start dominating the chain with Tier-1 media coverage." />
    <meta name="keywords" content="Web3 PR, Blockchain PR, Crypto Press Release, Digital Asset Marketing, Token Launch, Crypto Marketing, NFT PR, DeFi Public Relations" />
    <meta name="author" content="Blockchain Wire" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://blockchainwire.io/" />
    <meta property="og:title" content="Blockchain Wire | Web3 PR & Authority Distribution Platform" />
    <meta property="og:description" content="High-authority PR distribution for Web3 and Digital Asset projects. Get featured on Yahoo Finance, Business Insider, AP News and more." />
    <meta property="og:image" content="https://blockchainwire.io/og-image.png" />
    <meta property="og:site_name" content="Blockchain Wire" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://blockchainwire.io/" />
    <meta property="twitter:title" content="Blockchain Wire | Web3 PR & Authority Distribution Platform" />
    <meta property="twitter:description" content="High-authority PR distribution for Web3 and Digital Asset projects. Get featured on Tier-1 media outlets." />
    <meta property="twitter:image" content="https://blockchainwire.io/og-image.png" />
    <meta property="twitter:site" content="@blockchain_wire" />
    
    <!-- Additional SEO -->
    <link rel="canonical" href="https://blockchainwire.io/" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="theme-color" content="#35bacf" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Blockchain Wire",
      "url": "https://blockchainwire.io",
      "logo": "https://blockchainwire.io/Logo Horizontal Color.svg",
      "description": "High-authority PR distribution for Web3 and Digital Asset projects",
      "sameAs": [
        "https://www.facebook.com/blockchain.wire",
        "https://twitter.com/blockchain_wire"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
